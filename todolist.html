<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }body {
  background: linear-gradient(135deg, #667eea, #764ba2);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  background: white;
  width: 100%;
  max-width: 450px;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

h1 {
  text-align: center;
  margin-bottom: 20px;
  color: #333;
}

.input-section {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

input {
  flex: 1;
  padding: 12px;
  border: 2px solid #ddd;
  border-radius: 10px;
  font-size: 16px;
  outline: none;
}

input:focus {
  border-color: #667eea;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

button:hover {
  background: #5a67d8;
}

ul {
  list-style: none;
}

li {
  background: #f4f4f4;
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s;
}

li.completed span {
  text-decoration: line-through;
  color: gray;
}

.task-buttons {
  display: flex;
  gap: 8px;
}

.complete-btn {
  background: #38a169;
}

.complete-btn:hover {
  background: #2f855a;
}

.delete-btn {
  background: #e53e3e;
}

.delete-btn:hover {
  background: #c53030;
}

.empty-message {
  text-align: center;
  color: gray;
  margin-top: 15px;
}

  </style>
</head>
<body>
  <div class="container">
    <h1>To-Do List</h1><div class="input-section">
  <input type="text" id="taskInput" placeholder="Enter a task..." />
  <button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

<p class="empty-message" id="emptyMessage">No tasks added yet.</p>

  </div>  <script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');
    const emptyMessage = document.getElementById('emptyMessage');

    function addTask() {
      const taskText = taskInput.value.trim();

      if (taskText === '') {
        alert('Please enter a task!');
        return;
      }

      const li = document.createElement('li');

      li.innerHTML = `
        <span>${taskText}</span>
        <div class="task-buttons">
          <button class="complete-btn" onclick="toggleComplete(this)">✔</button>
          <button class="delete-btn" onclick="deleteTask(this)">✖</button>
        </div>
      `;

      taskList.appendChild(li);
      taskInput.value = '';
      updateEmptyMessage();
    }

    function toggleComplete(button) {
      const li = button.parentElement.parentElement;
      li.classList.toggle('completed');
    }

    function deleteTask(button) {
      const li = button.parentElement.parentElement;
      li.remove();
      updateEmptyMessage();
    }

    function updateEmptyMessage() {
      emptyMessage.style.display =
        taskList.children.length === 0 ? 'block' : 'none';
    }

    taskInput.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        addTask();
      }
    });
  </script></body>
</html>
